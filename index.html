<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Acadêmico - Algoritmos e Programação</title>
    <style>
        :root {
            --primary-purple: #4A3B5C; /* Roxo escuro aquarelável */
            --accent-pink: #F8C3CD;    /* Rosa clarinho aquarela vibrante */
            --soft-pink: #FCEEF1;      /* Rosa pastel bem suave para fundos */
            --earth-brown: #6E554F;    /* Marrom terroso sutil */
            --bg-color: #F7F4F6;       /* Fundo geral tom de papel artesanal */
            --card-bg: #FFFFFF;        
            --text-color: #2D2533;     
        }

        body {
            font-family: "Courier New", Courier, monospace; 
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            font-weight: bold;
        }

        header {
            background: linear-gradient(135deg, var(--primary-purple) 0%, #5E465A 100%);
            color: #FFFFFF;
            text-align: center;
            padding: 50px 20px;
            border-bottom: 5px solid var(--accent-pink);
            box-shadow: 0 4px 15px rgba(74, 59, 92, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-pink);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header h2 {
            margin: 10px 0 0 0;
            font-size: 1.4rem;
            font-weight: normal;
            color: #FFFFFF;
        }

        header p {
            margin: 15px 0 0 0;
            color: var(--accent-pink);
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .container {
            max-width: 800px; /* Reduzido para ficar mais centralizado por ser apenas um card */
            margin: 40px auto;
            padding: 0 20px;
        }

        .card-materia {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 4px 4px 15px rgba(110, 85, 79, 0.12);
            padding: 30px;
            border: 2px solid var(--accent-pink);
            border-top: 10px solid var(--primary-purple);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-materia:hover {
            transform: translateY(-5px);
            box-shadow: 6px 6px 20px rgba(74, 59, 92, 0.2);
        }

        .card-materia h2 {
            margin-top: 0;
            color: var(--primary-purple);
            font-size: 1.4rem;
            border-bottom: 3px dashed var(--accent-pink);
            padding-bottom: 10px;
        }

        .professor-nome {
            color: var(--earth-brown);
            font-size: 1rem;
            margin-bottom: 15px;
            background-color: var(--soft-pink);
            padding: 6px 12px;
            border-left: 3px solid var(--earth-brown);
            display: inline-block;
        }

        .lista-trabalhos {
            list-style: none;
            padding: 0;
            margin: 25px 0 0 0;
        }

        .lista-trabalhos li {
            padding: 14px 0;
            border-bottom: 1px dashed var(--accent-pink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .lista-trabalhos li:last-child {
            border-bottom: none;
        }

        .status {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status.concluido { 
            background: var(--accent-pink); 
            color: var(--primary-purple);
            border: 1px solid var(--primary-purple);
        }

        .btn-ver {
            background-color: var(--primary-purple);
            color: #FFFFFF;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
            border: 1px solid var(--earth-brown);
        }

        .btn-ver:hover {
            background-color: var(--accent-pink);
            color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--earth-brown);
            font-size: 0.9rem;
            border-top: 3px dashed var(--accent-pink);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Universidade Federal do Pampa</h1>
        <h2>⚡ Engenharia Elétrica ⚡</h2>
        <p>Aulas e Projetos - 1º Semestre / 2026</p>
    </header>

    <div class="container">
        <!-- MATÉRIA ÚNICA: ALGORITMOS E PROGRAMAÇÃO -->
        <div class="card-materia">
            <h2>💻 Algoritmos e Programação</h2>
            <div class="professor-nome">Prof. Diego Luis Kreutz</div>
            <ul class="lista-trabalhos">
                <li>
                    <span>Exercício 01 - Introdução</span>
                    <span class="status concluido">Concluido</span>
                </li>
                <li>
                    <span>Projeto Primeiro Semestre</span>
                    <a href="#" class="btn-ver">Ver Projeto</a>
                </li>
            </ul>
        </div>
    </div>

    <footer>
        <p>Desenvolvido por Maria Frandalozzo &copy; 2026</p>
    </footer>

</body>
</html>
